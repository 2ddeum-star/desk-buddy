name: Build

on:
  # 태그(vX.Y.Z) 푸시 시 자동 빌드 + Release 생성
  push:
    tags: ['v*']
  # 수동 트리거 (Actions 탭에서 Run workflow)
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # uiohook-napi(node-gyp)가 Python 3.12에서 제거된 distutils를 쓰므로 3.11 강제
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      # 활성 캐릭터의 자산을 assets/ 와 character-config.js 로 복사
      # (활성 캐릭터는 package.json 의 "deskBuddy.activeCharacter" 또는 CHARACTER 환경변수)
      - name: Stage active character
        run: node build-character.js

      - name: Build (electron-builder)
        run: npx electron-builder --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desk-buddy-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          generate_release_notes: true
